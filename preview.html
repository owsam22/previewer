<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview Your Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    
    .preview-header {
      padding: 0.8rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .header-left, .header-center, .header-right {
      display: flex;
      align-items: center;
    }

    .preview-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .preview-header h1 .emoji {
      font-size: 1.2rem;
    }

    .button-group {
      display: flex;
      gap: 0.4rem;
      background: #f8fafc;
      padding: 0.3rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .preview-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem; 
      padding: 0.4rem 0.8rem;
      background: transparent;
      color: var(--text-light);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-btn:hover {
      background: #e2e8f0;
      color: var(--text-main);
      transform: translateY(-1px);
    }

    .preview-btn:active {
      transform: translateY(1px);
    }

    .action-btn {
      font-size: 0.95rem;
      font-weight: 600;
      gap: 6px;
      color: var(--text-main);
    }

    .action-btn:hover {
      background: #e2e8f0;
    }

    .primary-action {
      background: var(--primary);
      color: white;
    }
    
    .primary-action:hover {
      background: var(--text-main);
      color: white;
    }

    /* Device toggles */
    .device-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .preview-container {
      width: 100%;
      height: 80vh;
      max-width: 1280px;
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* Soft shadow */
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .browser-frame {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .dot.green { background: #22c55e; }

    .url-bar {
      margin-left: 20px;
      background: #ffffff;
      color: var(--text-light);
      border: 1px solid var(--border-color);
      padding: 4px 14px;
      font-family: monospace;
      font-size: 0.85rem;
      border-radius: 20px;
      flex: 1;
      text-align: center;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    iframe {
      width: 100%;
      flex: 1;
      border: none;
      background: white;
    }
    
    .preview-container.mobile {
      width: 375px;
      height: 812px;
    }
    .preview-container.tablet {
      width: 768px;
      height: 1024px;
    }

    @media (max-width: 768px) {
      .preview-container {
        height: 70vh;
        width: 100% !important; 
      }
      .device-wrapper { padding: 1rem; }
      .button-group { flex-wrap: wrap; }
    }
    
    /* Removed extra .btn styles */
  </style>
</head>
<body>

  <header class="preview-header">
    <div class="header-left">
      <h1><span class="emoji">🔍</span> Live Preview</h1>
    </div>
    <div class="header-center button-group">
      <button class="preview-btn" onclick="setDevice('desktop')" title="Desktop">🖥️</button>
      <button class="preview-btn" onclick="setDevice('tablet')" title="Tablet">📱</button>
      <button class="preview-btn" onclick="setDevice('mobile')" title="Mobile">📱</button>
    </div>
    <div class="header-right button-group">
      <button class="preview-btn action-btn" onclick="restartPreview()">🔄 Restart</button>
      <button class="preview-btn action-btn primary-action" onclick="goHome()">🏠 Home</button>
    </div>
  </header>

  <div class="device-wrapper">
    <div class="preview-container" id="deviceFrame">
      <div class="browser-frame">
        <div class="dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <div class="url-bar">localhost:preview</div>
      </div>
      <iframe id="previewFrame"></iframe>
    </div>
  </div>
  
  <script type="module" src="./src/preview.ts"></script>
</body>
</html>
